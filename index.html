<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite Especial - Fundo do Mar</title>
    <style>
        :root { 
            --tempo-cena: 6s; 
            --largura-botao: 220px; /* Tamanho fixo para botões iguais */
        }
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Arial', sans-serif; background: #000; }

        #convite-container { position: relative; width: 100vw; height: 100vh; }

        .cena {
            position: absolute; width: 100%; height: 100%;
            opacity: 0; transition: opacity 1.5s ease-in-out;
            display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;
            visibility: hidden; /* Evita cliques em cenas invisíveis */
        }
        .cena.ativa { opacity: 1; z-index: 10; visibility: visible; }

        .bg-video {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover; z-index: -1;
        }

        /* Efeito de Flutuação Diferenciada (Parallax Simples) */
        .personagem-gif {
            position: absolute;
            z-index: 15;
            animation: flutuar 4s ease-in-out infinite alternate;
        }
        .personagem-gif:nth-child(even) { animation-duration: 6s; animation-delay: 1s; }

        @keyframes flutuar {
            from { transform: translateY(0px) rotate(-3deg); }
            to { transform: translateY(-30px) rotate(3deg); }
        }

        .texto-cena {
            color: white; font-size: 2.2rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
            z-index: 20; padding: 20px; max-width: 85%;
        }

        /* --- HOTSPOTS (BOTÕES FINAIS) --- */
        .botoes-finais {
            display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 20px;
        }

        .botoes-finais a {
            display: flex; align-items: center; justify-content: center;
            width: var(--largura-botao); height: 55px; /* Tamanho padrão */
            background: transparent; /* Invisível por padrão */
            color: transparent; /* Texto invisível para ser usado apenas como área de clique */
            text-decoration: none; border-radius: 10px;
            font-weight: bold; transition: 0.3s;
            border: 2px solid transparent;
        }

        /* MODO EDIÇÃO: Ative adicionando a classe 'debug-mode' na tag <body> */
        .debug-mode .botoes-finais a {
            background: rgba(255, 105, 180, 0.4); 
            border: 2px dashed #ff69b4;
            color: white;
            font-size: 12px;
        }

        #capa { 
            background: url('capa.jpg') no-repeat center center; background-size: cover;
            cursor: pointer; z-index: 1000; opacity: 1; visibility: visible;
        }
        
        #controle-som {
            position: fixed; top: 20px; left: 20px; z-index: 1100;
            background: rgba(255,255,255,0.5); border: none; border-radius: 50%;
            width: 45px; height: 45px; cursor: pointer;
        }
    </style>
</head>
<body class="debug-mode">

    <button id="controle-som">🔇</button>
    <audio id="musica-fundo" loop src="audio.mp3"></audio>

    <div id="convite-container">
        <div id="capa" class="cena ativa" onclick="iniciarConvite()">
            <h1 class="texto-cena">Clique para abrir o Convite Especial 🌊</h1>
        </div>
    </div>

    <script>
        const dadosCenas = [
            { texto: "Junte-se a nós em uma aventura!", video: "cena1.mp4", gifs: ["polvo.gif"], posGifs: ["top:20%; left:10%"] },
            { texto: "Sabrina faz 1 aninho!", video: "cena2.mp4", gifs: ["peixe.gif"], posGifs: ["bottom:15%; right:10%"] },
            { texto: "Venha celebrar com a gente!", video: "cena3.mp4", gifs: ["baleia.gif"], posGifs: ["top:40%; left:30%"] },
            { 
                texto: "Esperamos por você!", 
                video: "final.mp4", 
                gifs: [], 
                links: [
                    { label: "CONFIRMAR", url: "https://wa.me/5571993233142" },
                    { label: "MAPA", url: "https://maps.google.com" }
                ] 
            }
        ];

        const container = document.getElementById('convite-container');
        const audio = document.getElementById('musica-fundo');
        const btnSom = document.getElementById('controle-som');
        let cenaAtual = 0;

        // Gerar Cenas Dinamicamente
        dadosCenas.forEach((dados, index) => {
            const divCena = document.createElement('div');
            divCena.className = 'cena';
            divCena.id = `cena-${index + 1}`;

            let htmlGifs = '';
            dados.gifs.forEach((gif, i) => {
                htmlGifs += `<img src="${gif}" class="personagem-gif" style="${dados.posGifs[i]}">`;
            });

            let htmlBotoes = '';
            if(dados.links) {
                htmlBotoes = `<div class="botoes-finais">` + 
                    dados.links.map(l => `<a href="${l.url}" target="_blank">${l.label}</a>`).join('') + 
                    `</div>`;
            }

            divCena.innerHTML = `
                <video class="bg-video" loop muted playsinline>
                    <source src="${dados.video}" type="video/mp4">
                </video>
                <div class="texto-cena">${dados.texto} ${htmlBotoes}</div>
                ${htmlGifs}
            `;
            container.appendChild(divCena);
        });

        function iniciarConvite() {
            document.getElementById('capa').classList.remove('ativa');
            audio.play().catch(() => console.log("Áudio aguardando interação"));
            btnSom.innerText = "🔊";
            
            // Pequeno delay para garantir a transição suave da capa
            setTimeout(proximaCena, 500);
        }

        function proximaCena() {
            const totalCenas = dadosCenas.length;
            
            // Remove 'ativa' de todas as cenas antes de mostrar a próxima
            document.querySelectorAll('.cena').forEach(c => {
                c.classList.remove('ativa');
                const v = c.querySelector('video');
                if(v) v.pause();
            });

            if (cenaAtual < totalCenas) {
                cenaAtual++;
                const cenaElemento = document.getElementById(`cena-${cenaAtual}`);
                
                if (cenaElemento) {
                    cenaElemento.classList.add('ativa');
                    const video = cenaElemento.querySelector('video');
                    if(video) video.play();

                    // Só agenda a próxima se não for a última
                    if (cenaAtual < totalCenas) {
                        setTimeout(proximaCena, 6000);
                    }
                }
            }
        }

        btnSom.onclick = () => {
            if (audio.paused) { audio.play(); btnSom.innerText = "🔊"; }
            else { audio.pause(); btnSom.innerText = "🔇"; }
        };
    </script>
</body>
</html>
