<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite Especial - Fundo do Mar</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: #000;
        }

        #convite-container {
            position: relative; width: 100vw; height: 100vh; overflow: hidden;
        }

        /* ── CENAS ── */
        .cena {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            visibility: hidden; overflow: hidden;
            will-change: transform;
        }
        .cena.ativa { visibility: visible; z-index: 10; }

        /* BG com margem lateral para o parallax não mostrar borda */
        .bg-video {
            position: absolute;
            top: 0; left: -15%;
            width: 130%; height: 100%;
            object-fit: cover; z-index: 0;
            will-change: transform;
        }

        /* ── GIFs: fade-in após a transição ── */
        .personagem-gif {
            position: absolute; z-index: 5;
            opacity: 0;
            transition: opacity 0.8s ease;
            animation: flutuar 4s ease-in-out infinite alternate;
            will-change: transform, opacity;
        }
        .personagem-gif.visivel { opacity: 1; }
        .personagem-gif:nth-child(even) { animation-duration: 6s; animation-delay: 1s; }
        @keyframes flutuar {
            from { transform: translateY(0px) rotate(-3deg); }
            to   { transform: translateY(-28px) rotate(3deg); }
        }

        /* ── HOTSPOTS ── */
        .botoes-finais {
            position: absolute; z-index: 10;
            bottom: 10%; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 15px;
        }
        .botoes-finais a {
            display: flex; align-items: center; justify-content: center;
            width: 220px; height: 55px;
            background: transparent; color: transparent;
            text-decoration: none; border-radius: 10px;
            border: 2px solid transparent;
        }
        /* Ative debug-mode no <body> para ver os botões */
        .debug-mode .botoes-finais a {
            background: rgba(255,105,180,0.4);
            border: 2px dashed #ff69b4;
            color: white; font-size: 13px; font-weight: bold;
        }

        /* ── CAPA ── */
        #capa {
            position: absolute; inset: 0; z-index: 1000;
            background: url('capa.jpg') no-repeat center center / cover;
            cursor: pointer; visibility: visible;
            transition: opacity 0.8s ease;
        }
        #capa.fechando { opacity: 0; pointer-events: none; }

        /* ── BOTÃO SOM ── */
        #controle-som {
            position: fixed; top: 20px; left: 20px; z-index: 1100;
            background: rgba(255,255,255,0.5); border: none; border-radius: 50%;
            width: 45px; height: 45px; cursor: pointer; font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <button id="controle-som">🔇</button>
    <audio id="musica-fundo" loop src="audio.mp3"></audio>

    <div id="convite-container">
        <div id="capa"></div>
    </div>

    <script>
    /* ════════════════════════════════════════════════════════════
       ✏️  CONFIGURAÇÃO — edite apenas aqui
    ════════════════════════════════════════════════════════════ */
    const TEMPO_CENA_MS = 6000;  // duração de cada cena em ms
    const TRANSICAO_MS  = 900;   // duração do parallax em ms
    const PARALLAX_BG   = 0.25;  // 0=bg anda junto | 1=bg fica parado

    const dadosCenas = [
        {
            video: "cena1.mp4",
            gifs: [{ src: "polvo.gif", estilo: "top:20%; left:10%; width:18vw;" }]
        },
        {
            video: "cena2.mp4",
            gifs: [{ src: "peixe.gif", estilo: "bottom:15%; right:10%; width:15vw;" }]
        },
        {
            video: "cena3.mp4",
            gifs: [{ src: "baleia.gif", estilo: "top:40%; left:30%; width:22vw;" }]
        },
        {
            video: "final.mp4",
            gifs: [],
            links: [
                { label: "CONFIRMAR", url: "https://wa.me/5571993233142" },
                { label: "MAPA",      url: "https://maps.google.com"     }
            ]
        }
    ];
    /* ════════════════════════════════════════════════════════════ */

    const container = document.getElementById('convite-container');
    const audio     = document.getElementById('musica-fundo');
    const btnSom    = document.getElementById('controle-som');
    const capa      = document.getElementById('capa');
    let proximaIdx  = 1;
    let emTransicao = false;
    let timer       = null;

    /* ── Constrói cenas ──────────────────────────────────────── */
    const elementos = dadosCenas.map((dados, i) => {
        const div = document.createElement('div');
        div.className = 'cena';

        const htmlBotoes = dados.links
            ? `<div class="botoes-finais">` +
              dados.links.map(l =>
                `<a href="${l.url}" target="_blank">${l.label}</a>`
              ).join('') + `</div>`
            : '';

        div.innerHTML = `
            <video class="bg-video" loop muted playsinline>
                <source src="${dados.video}" type="video/mp4">
            </video>
            ${dados.gifs.map(g =>
                `<img src="${g.src}" class="personagem-gif" style="${g.estilo}">`
            ).join('')}
            ${htmlBotoes}
        `;
        container.appendChild(div);
        return div;
    });

    /* ── Easing ──────────────────────────────────────────────── */
    function ease(t) { return t < .5 ? 2*t*t : -1+(4-2*t)*t; }

    /* ── Parallax via RAF ────────────────────────────────────── */
    function transicionar(elSaindo, elEntrando, onFim) {
        const bgSaindo   = elSaindo  ? elSaindo.querySelector('.bg-video')  : null;
        const bgEntrando = elEntrando.querySelector('.bg-video');
        const gifsEntr   = elEntrando.querySelectorAll('.personagem-gif');

        // Esconde GIFs da cena entrando (vão aparecer depois)
        gifsEntr.forEach(g => g.classList.remove('visivel'));

        // Posiciona cena entrando fora da tela à direita
        elEntrando.style.transform  = 'translateX(100%)';
        elEntrando.style.visibility = 'visible';
        if (bgEntrando) bgEntrando.style.transform = `translateX(${PARALLAX_BG * 100 - 15}%)`;

        const videoEntrando = elEntrando.querySelector('video');
        if (videoEntrando) videoEntrando.play().catch(() => {});

        const inicio = performance.now();

        function frame(agora) {
            const t    = Math.min((agora - inicio) / TRANSICAO_MS, 1);
            const prog = ease(t);

            // Cena saindo → esquerda (100%)
            if (elSaindo) {
                elSaindo.style.transform = `translateX(${-prog * 100}%)`;
                // BG saindo: move menos (parallax)
                if (bgSaindo)
                    bgSaindo.style.transform = `translateX(${prog * (PARALLAX_BG * 100) - 15}%)`;
            }

            // Cena entrando: direita → centro
            elEntrando.style.transform = `translateX(${(1 - prog) * 100}%)`;
            // BG entrando: move menos (parallax)
            if (bgEntrando)
                bgEntrando.style.transform = `translateX(${-(1 - prog) * (PARALLAX_BG * 100) - 15}%)`;

            if (t < 1) {
                requestAnimationFrame(frame);
            } else {
                // Limpeza da cena saindo
                if (elSaindo) {
                    elSaindo.style.visibility = 'hidden';
                    elSaindo.style.transform  = '';
                    elSaindo.classList.remove('ativa');
                    const vS = elSaindo.querySelector('video');
                    if (vS) { vS.pause(); vS.currentTime = 0; }
                    elSaindo.querySelectorAll('.personagem-gif')
                            .forEach(g => g.classList.remove('visivel'));
                }

                // Finaliza cena entrando
                elEntrando.style.transform = '';
                if (bgEntrando) bgEntrando.style.transform = 'translateX(-15%)';
                elEntrando.classList.add('ativa');

                // GIFs surgem suavemente após a transição
                setTimeout(() => {
                    gifsEntr.forEach(g => g.classList.add('visivel'));
                }, 150);

                if (onFim) onFim();
            }
        }
        requestAnimationFrame(frame);
    }

    /* ── Avança cenas ────────────────────────────────────────── */
    function irParaCena(index) {
        if (emTransicao) return;
        emTransicao = true;
        clearTimeout(timer);

        const elSaindo   = container.querySelector('.cena.ativa');
        const elEntrando = elementos[index];

        transicionar(elSaindo, elEntrando, () => {
            emTransicao = false;
            proximaIdx  = index + 1;
            if (index < dadosCenas.length - 1) {
                timer = setTimeout(() => irParaCena(index + 1), TEMPO_CENA_MS);
            }
        });
    }

    /* ── Clique na capa ──────────────────────────────────────── */
    capa.addEventListener('click', () => {
        capa.classList.add('fechando');
        audio.play().catch(() => {});
        btnSom.innerText = '🔊';

        setTimeout(() => {
            capa.style.display = 'none';

            // Primeira cena: aparece diretamente
            const primeira = elementos[0];
            primeira.style.visibility = 'visible';
            primeira.classList.add('ativa');
            const v = primeira.querySelector('video');
            if (v) v.play().catch(() => {});
            setTimeout(() => {
                primeira.querySelectorAll('.personagem-gif')
                        .forEach(g => g.classList.add('visivel'));
            }, 400);

            proximaIdx = 1;
            timer = setTimeout(() => irParaCena(1), TEMPO_CENA_MS);
        }, 800);
    });

    /* ── Som ─────────────────────────────────────────────────── */
    btnSom.addEventListener('click', () => {
        if (audio.paused) { audio.play(); btnSom.innerText = '🔊'; }
        else              { audio.pause(); btnSom.innerText = '🔇'; }
    });
    </script>
</body>
</html>
